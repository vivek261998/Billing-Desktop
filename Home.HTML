<html>
<head>
<title>Billing App</title>
</head>

<script>

function AddItem(){

  let item = document.getElementById("item").value;
  let price = document.getElementById("price").value;
  let qty = document.getElementById("qty").value;

  let table = document.getElementById("tableinfo").getElementsByTagName("tbody")[0];

  let row = table.insertRow();

  let cell1 = row.insertCell(0);
  let cell2 = row.insertCell(1);
  let cell3 = row.insertCell(2);
  let cell4 = row.insertCell(3);

  cell1.innerHTML = item;
  cell2.innerHTML = price;
  cell3.innerHTML = qty;
  cell4.innerHTML = price * qty;
}
</script>

<body>

<h1>Billing App</h1>

<div>
  <input type="text" id="item" placeholder="Enter Item Name">
  <input type="number" id="price" placeholder="Price(rs)">
  <input type="number" id="qty" placeholder="Qty">
  <input type="button" value="Add Item" onclick="AddItem()">
</div>

<table id="tableinfo" border="1">
   <thead>
      <tr>
         <th>Item</th>
         <th>Price</th>
         <th>Quantity</th>
         <th>Total</th>
      </tr>
   </thead>
   <tbody>
   </tbody>
</table>

</body>
</html>
